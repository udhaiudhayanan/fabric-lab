<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.app.github.dev; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.app.github.dev;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Integrity Ledger | Blockchain Audit</title>
    
    <style>
        /* Cosmos.so Inspired Minimalist Theme */
        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --border: #222;
            --text-main: #efefef;
            --text-dim: #666;
            --accent: #00ff88;
            --error: #ff4444;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-weight: 300; 
            letter-spacing: -2px; 
            font-size: 2.8rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* --- TRANSACTION PANEL --- */
        .controls-container {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 50px;
        }

        .transaction-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            min-width: 180px;
        }

        .input-group label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            background: #121212;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: #181818;
        }

        .btn-primary {
            background: var(--accent);
            color: black;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            height: 48px;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .btn-primary:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-secondary:hover { color: white; border-color: #666; }

        /* --- GRID & CARDS --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 24px; 
            width: 100%;
            max-width: 1000px;
        }

        .card { 
            background: var(--card-bg);
            border: 1px solid var(--border); 
            padding: 35px; 
            border-radius: 10px; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            animation: fadeIn 0.8s ease forwards;
        }

        .card:hover { 
            border-color: #555; 
            transform: translateY(-10px);
            background: #141414;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .owner-label { 
            font-size: 0.65rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 2.5px;
            margin-bottom: 15px;
        }

        .asset-id {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
        }

        .asset-owner {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .value { 
            font-size: 2rem; 
            font-weight: 700; 
            margin-top: 25px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-msg { color: var(--text-dim); font-size: 0.9rem; margin-top: 20px; letter-spacing: 1px; }
        .error { color: var(--error); border: 1px solid #ff444433; padding: 25px; border-radius: 10px; width: 100%; text-align: center; }
        
        @media (max-width: 600px) {
            .transaction-box { flex-direction: column; align-items: stretch; }
            .btn-secondary { margin-left: 0; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <h1>Model Integrity Ledger</h1>

    <div class="controls-container">
        <div class="transaction-box">
            <div class="input-group">
                <label>Identity (ID)</label>
                <input type="text" id="newId" placeholder="asset101">
            </div>
            <div class="input-group">
                <label>Auth Owner</label>
                <input type="text" id="newOwner" placeholder="Name">
            </div>
            <div class="input-group">
                <label>Value (USD)</label>
                <input type="number" id="newValue" placeholder="0">
            </div>
            <button class="btn-primary" onclick="submitTransaction()">Commit</button>
        </div>
        
        <div style="margin-top: 20px; text-align: right;">
            <button class="btn-secondary" onclick="exportAuditLog()">Export Audit Report (PDF)</button>
        </div>
    </div>
    
    <div id="asset-grid" class="grid"></div>

    <script>
        // REPLACE with your current API URL
        const API_BASE_URL = 'https://crispy-space-doodle-9xx96769ppwhpvrp-3000.app.github.dev';

        // 1. FETCH LEDGER STATE
        async function loadAssets() {
            const grid = document.getElementById('asset-grid');
            grid.innerHTML = '<p class="status-msg">Accessing Distributed Ledger...</p>';
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/assets`);
                if (!res.ok) throw new Error(`Gateway Error: ${res.status}`);
                
                const assets = await res.json();
                
                if (!assets || assets.length === 0) {
                    grid.innerHTML = '<p class="status-msg">No assets found on the ledger.</p>';
                    return;
                }

                grid.innerHTML = assets.map((a, index) => `
                    <div class="card" style="animation-delay: ${index * 0.05}s">
                        <div class="owner-label">Verified Record</div>
                        <div class="asset-id">${a.assetID || a.ID}</div>
                        <div class="asset-owner">Owner: ${a.owner || a.Owner}</div>
                        <div class="value">$${a.appraisedValue || a.AppraisedValue || 0}</div>
                    </div>
                `).join('');

            } catch (err) {
                grid.innerHTML = `
                    <div class="error">
                        <p><strong>Handshake Failed</strong></p>
                        <p style="font-size: 0.8rem; opacity: 0.7;">Check if API Port 3000 is Public and Service is running.</p>
                    </div>
                `;
            }
        }

        // 2. COMMIT TRANSACTION
        async function submitTransaction() {
            const id = document.getElementById('newId').value;
            const owner = document.getElementById('newOwner').value;
            const value = document.getElementById('newValue').value;

            if (!id || !owner || !value) {
                alert("Please fill all cryptographic fields.");
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/assets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, owner, value: parseInt(value) })
                });

                if (res.ok) {
                    document.getElementById('newId').value = '';
                    document.getElementById('newOwner').value = '';
                    document.getElementById('newValue').value = '';
                    loadAssets();
                } else {
                    alert("Validation Error: Transaction rejected by Peer.");
                }
            } catch (err) {
                alert("Gateway Timeout: Blockchain node unreachable.");
            }
        }

        // 3. EXPORT AUDIT LOG (PDF/PRINT)
        async function exportAuditLog() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/history`);
                const data = await res.json();
                
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head>
                            <title>Blockchain Audit Report</title>
                            <style>
                                body { font-family: 'Courier New', Courier, monospace; padding: 50px; }
                                table { width: 100%; border-collapse: collapse; margin-top: 30px; }
                                th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                                th { background-color: #f2f2f2; }
                                .header { border-bottom: 2px solid #000; padding-bottom: 20px; }
                                .status { color: green; font-weight: bold; }
                            </style>
                        </head>
                        <body>
                            <div class="header">
                                <h1>MODEL INTEGRITY LEDGER: AUDIT REPORT</h1>
                                <p><strong>Network:</strong> ${data.network}</p>
                                <p><strong>Timestamp:</strong> ${data.generatedAt}</p>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>ASSET ID</th>
                                        <th>AUTHORIZED OWNER</th>
                                        <th>VALUATION</th>
                                        <th>INTEGRITY STATUS</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.records.map(r => `
                                        <tr>
                                            <td>${r.assetID || r.ID}</td>
                                            <td>${r.owner || r.Owner}</td>
                                            <td>$${r.appraisedValue || r.AppraisedValue}</td>
                                            <td class="status">VERIFIED ON CHAIN</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                            <p style="margin-top:40px; font-size: 12px;">This document serves as proof of existence and ownership as recorded on the distributed ledger.</p>
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => { printWindow.print(); }, 500);
            } catch (err) {
                alert("Failed to compile Audit History.");
            }
        }

        // Auto-load on entry
        loadAssets();
    </script>
</body>
</html>
